<title>Day 14｜旅遊、機場｜核心單字分步驟學習</title>
<style>
:root{

  --gold:#e8a911; --red:#c85454; --red-soft:#fbeaea;
  --blue:#4a7fb5; --blue-soft:#e9f1f8; --line:#dde6e3;
  --ok:#2e8b6f; --ok-soft:#e3f2ec;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{font-size:17px;}
body{margin:0; background:var(--bg); color:var(--ink);
  font-family:"Segoe UI","Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;

#app{max-width:640px; margin:0 auto; padding:12px 14px 90px;}
header.top{position:sticky; top:0; z-index:20; background:var(--bg);
  padding:10px 2px 8px; border-bottom:1px solid var(--line);}
h1{font-size:1.15rem; margin:0 0 6px; color:var(--brand-dark);}
.progress-wrap{height:10px; background:#e2eae7; border-radius:6px; overflow:hidden; margin-top:6px;}
.progress-bar{height:100%; background:linear-gradient(90deg,var(--brand),#57b894); width:0%;
  border-radius:6px; transition:width .3s;}
.progress-label{font-size:.85rem; color:var(--sub); margin-top:4px;}
.chips{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 2px;}
.chip{border:1.5px solid var(--line); background:var(--card); color:var(--sub);
  border-radius:999px; padding:7px 14px; font-size:.92rem; cursor:pointer;}
.chip.on{background:var(--brand); border-color:var(--brand); color:#fff; font-weight:600;}
.card{background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:20px 18px; margin:14px 0; box-shadow:0 1px 4px rgba(40,70,60,.06);}
.center{text-align:center;}
.word-big{font-size:2.2rem; font-weight:700; color:var(--brand-dark); letter-spacing:.5px; word-break:break-word;}
.stars{color:var(--gold); font-size:1.15rem; letter-spacing:2px;}
.stars .dim{color:#d8d2c2;}
.kk{color:var(--sub); font-size:.98rem; margin-top:4px;}
.pos-zh{font-size:1.25rem; margin:10px 0 2px;}
.pos{color:var(--blue); font-weight:600; margin-right:6px; font-size:1.02rem;}
.badge-part{display:inline-block; font-size:.78rem; color:var(--sub);

button.big{display:block; width:100%; border:none; border-radius:14px;
  padding:16px 12px; font-size:1.12rem; font-weight:700; cursor:pointer; margin:10px 0;
  font-family:inherit;}
button.big:active{transform:scale(.985);}
.btn-fam{background:var(--ok-soft); color:var(--brand-dark); border:2px solid var(--brand)!important;}
.btn-unfam{background:var(--red-soft); color:var(--red); border:2px solid var(--red)!important;}
.btn-main{background:var(--brand); color:#fff;}
.btn-ghost{background:var(--card); color:var(--brand-dark); border:1.5px solid var(--brand)!important;}
.btn-warn{background:#fff6e8; color:#9a6b00; border:1.5px solid var(--gold)!important;}
.btn-plain{background:#eef2f1; color:var(--sub);}
.row{display:flex; gap:10px;}
.row>button{flex:1;}
.small-note{font-size:.88rem; color:var(--sub);}
.speak-btn{border:1.5px solid var(--brand); background:var(--brand-soft); color:var(--brand-dark);
  border-radius:999px; padding:8px 16px; font-size:1rem; cursor:pointer; font-family:inherit;}
.speak-btn.mini{padding:4px 10px; font-size:.9rem;}
.example{background:var(--blue-soft); border-radius:12px; padding:12px 14px; margin-top:12px; text-align:left;}
.example .en{font-size:1.08rem; line-height:1.6;}
.example .en span.w{cursor:pointer; border-radius:4px; padding:0 1px;}
.example .en span.w.hl{background:#ffe9a8;}
.example .zh{color:var(--sub); margin-top:6px; font-size:.98rem;}
.tipbox{background:#fdf8ec; border:1px solid #f0e2bb; border-radius:12px;
  padding:10px 14px; margin-top:12px; text-align:left; font-size:.95rem;}
.tipbox b.lbl{color:#9a6b00;}
.relbox{margin-top:10px; text-align:left; font-size:.95rem; color:var(--sub);}
.relbox .tag{display:inline-block; background:#eef2f1; border-radius:6px; padding:0 6px;
  margin-right:6px; font-size:.82rem; color:var(--brand-dark);}
.opt{display:block; width:100%; text-align:left; background:var(--card);
  border:2px solid var(--line); border-radius:12px; padding:14px 16px;
  font-size:1.15rem; font-weight:600; color:var(--ink); margin:8px 0; cursor:pointer; font-family:inherit;}
.opt.correct{border-color:var(--ok); background:var(--ok-soft);}
.opt.wrong{border-color:var(--red); background:var(--red-soft);}
.opt:disabled{cursor:default; opacity:.92;}
.feedback{font-size:1.05rem; font-weight:700; margin:10px 0; min-height:1.5em;}
.feedback.good{color:var(--brand-dark);}
.feedback.bad{color:var(--red);}
.list-item{display:flex; align-items:center; gap:10px; padding:10px 4px;
  border-bottom:1px solid var(--line); font-size:1rem;}
.list-item:last-child{border-bottom:none;}
.list-item .w{font-weight:700; color:var(--brand-dark); min-width:7.2em;}
.list-item .zh{color:var(--sub); flex:1; font-size:.92rem;}
.pill{font-size:.78rem; border-radius:6px; padding:1px 8px;}
.pill.fam{background:var(--ok-soft); color:var(--brand-dark);}
.pill.unfam{background:var(--red-soft); color:var(--red);}
.plan-table{width:100%; border-collapse:collapse; margin-top:10px; font-size:.95rem;}
.plan-table th,.plan-table td{border:1px solid var(--line); padding:8px 6px; text-align:center;}
.plan-table th{background:var(--brand-soft); color:var(--brand-dark);}
.plan-table tr.today-row{background:#fdf8ec;}
.day-input{width:90px; font-size:1.3rem; text-align:center; padding:8px;
  border:2px solid var(--brand); border-radius:10px; font-family:inherit;}
.stat-num{font-size:1.9rem; font-weight:800;}
.stat-fam{color:var(--brand-dark);} .stat-unfam{color:var(--red);}
.speed-toggle{display:inline-flex; border:1.5px solid var(--brand); border-radius:999px; overflow:hidden;}
.speed-toggle button{border:none; background:var(--card); color:var(--brand-dark);
  padding:6px 14px; font-size:.92rem; cursor:pointer; font-family:inherit;}
.speed-toggle button.on{background:var(--brand); color:#fff;}
.footer-nav{position:fixed; bottom:0; left:0; right:0; background:rgba(244,247,246,.96);
  border-top:1px solid var(--line); padding:8px 14px; z-index:30;}
.footer-nav .inner{max-width:640px; margin:0 auto; display:flex; gap:8px;}
.footer-nav button{flex:1; border:none; background:none; color:var(--sub);
  font-size:.85rem; padding:6px 2px; cursor:pointer; border-radius:10px; font-family:inherit;}
.footer-nav button.on{color:var(--brand-dark); font-weight:700; background:var(--brand-soft);}
.hidden{display:none!important;}
.uncertain-flag{font-size:.75rem; color:#b07f10; cursor:help;}
@media (max-width:420px){
  html{font-size:16px;}
  .word-big{font-size:1.9rem;}
}
</style>

const WORDS = DATA.words;
const LS_KEY = 'toeic_day14_stepapp_v1';

/* ---------- state ---------- */
const defaultState = () => ({
  filter: 'high',              // high = ★★★+★★（預設）, s3, s2, all
  marks: {},                   // num -> 'fam' | 'unfam'
  plan: null,                  // {days, start, batches:[{fam:[],unfam:[]}], doneDays:{}}
  review: [],                  // 待複習 num
  mastered: [],                // 已掌握 num
  screen: 'home'
});
let S = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const s = JSON.parse(raw); return Object.assign(defaultState(), s); }
  }catch(e){}
  return defaultState();
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} }

/* ---------- helpers ---------- */
const byNum = {}; WORDS.forEach(w => byNum[w.num] = w);
function starStr(n){ return '★'.repeat(n) + '<span class="dim">' + '★'.repeat(Math.max(0,3-n)) + '</span>'; }
function scopeWords(){
  if(S.filter==='s3') return WORDS.filter(w=>w.stars===3);
  if(S.filter==='s2') return WORDS.filter(w=>w.stars===2);
  if(S.filter==='all') return WORDS.slice();
  return WORDS.filter(w=>w.stars>=2);   // high
}
function sortLearn(a,b){ return b.stars-a.stars || a.num-b.num; }
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function planDayIndex(){
  if(!S.plan) return 1;
  const ms = (new Date(todayStr()) - new Date(S.plan.start));
  const k = Math.floor(ms/86400000)+1;
  return Math.min(Math.max(k,1), S.plan.days);
}
const PRAISE = ['答對了，很棒！👍','太好了，就是這個！🌟','漂亮！繼續保持～','沒錯！你越來越穩了 😊','正確！這個字是你的了'];
const COMFORT = ['沒關係，這個字會再出現，多聽幾次就熟了','別擔心，先記個印象就好 🌱','慢慢來，複習時再見到它','這個字比較難，放進複習清單囉'];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ---------- TTS ---------- */
let voiceEn = null, slowMode = false;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voiceEn = vs.find(v=>v.lang==='en-US') || vs.find(v=>v.lang.startsWith('en')) || null;
}
if('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text, cb){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  if(voiceEn) u.voice = voiceEn;
  u.rate = slowMode ? 0.65 : 0.95;
  if(cb) u.onend = cb;
  speechSynthesis.speak(u);
}
function speakWordThenExample(w){
  speak(w.word, ()=>{ if(w.example_en) setTimeout(()=>speak(w.example_en), 450); });
}

      Math.round(done/total*100)+'%"></div></div><div class="progress-label">'+label+'：'+done+' / '+total+'</div>';
  } else { $prog.innerHTML = ''; }
}
function renderFilter(show){
  if(!show){ $filter.innerHTML=''; return; }

}
function renderNav(){

}
function go(screen){ S.screen=screen; save(); render(); }
function render(){
  renderNav();
  renderFilter(['home','classify','browse'].includes(S.screen));

  ({home:renderHome, classify:renderClassify, plan:renderPlan, today:renderToday,
    browse:renderBrowse, listen:renderListen, quiz:renderQuiz}[S.screen]||renderHome)();
}

/* ---------- home ---------- */

  }
  if(S.review.length>0){
    html += '<button class="big btn-warn" onclick="startReview()">🔁 複習清單還有 '+S.review.length+' 個字</button>';
  }
  html += '<button class="big btn-plain" onclick="resetAll()">重設全部進度</button>';

function resetAll(){

  }
}

/* ---------- ① classify ---------- */
let clsCurrent = null, clsRevealed = false, clsChoice = null;
function renderClassify(){
  const scope = scopeWords();
  const queue = scope.filter(w=>!S.marks[w.num]).sort(sortLearn);
  const done = scope.length - queue.length;
  setProgress('分類進度', done, scope.length);
  if(queue.length===0){
    $screen.innerHTML = '<div class="card center"><div class="feedback good">🎉 分類完成！熟悉 '+
      scope.filter(w=>S.marks[w.num]==='fam').length+' 字、不熟悉 '+
      scope.filter(w=>S.marks[w.num]==='unfam').length+' 字</div>'+
      '<button class="big btn-main" onclick="go(\'plan\')">下一步：安排分幾天學 →</button></div>';
    return;
  }
  if(!clsCurrent || S.marks[clsCurrent.num] !== undefined && !clsRevealed){
    clsCurrent = queue[0]; clsRevealed=false; clsChoice=null;
  }
  const w = clsCurrent;
  let html = '<div class="card center">';
  html += '<div class="stars">'+starStr(w.stars)+'</div>';
  html += '<div class="word-big">'+w.word+'</div>';
  html += '<div style="margin-top:8px"><button class="speak-btn" onclick="speak(\''+esc(w.word)+'\')">🔊 聽發音</button></div>';
  if(!clsRevealed){
    html += '<div class="small-note" style="margin:12px 0 4px">認得這個字的意思嗎？</div>';
    html += '<div class="row"><button class="big btn-fam" onclick="clsMark(\'fam\')">😊 熟悉</button>'+
            '<button class="big btn-unfam" onclick="clsMark(\'unfam\')">🤔 不熟悉</button></div>';
  } else {
    html += senseBlock(w);
    html += '<div class="feedback '+(clsChoice==='fam'?'good':'')+'" style="margin-top:10px">'+
            (clsChoice==='fam'?'已標記為「熟悉」':'已標記為「不熟悉」，之後會多練幾次 💪')+'</div>';
    if(clsChoice==='fam'){
      html += '<button class="big btn-unfam" onclick="clsSwitch()">😅 看了中文才發現認錯 → 改為不熟悉</button>';
    }
    html += '<button class="big btn-main" onclick="clsNext()">下一個字 →</button>';
  }
  html += '</div>';
  $screen.innerHTML = html;
  if(!clsRevealed) speak(w.word);
}
function senseBlock(w){
  let h = '<div style="margin-top:10px">';
  w.senses.forEach(s=>{ h += '<div class="pos-zh"><span class="pos">'+s.pos+'</span>'+s.zh+'</div>'; });
  h += '<div class="kk">KK '+(w.kk_us?('['+w.kk_us+']'):'')+(w.kk_uk?('　英 ['+w.kk_uk+']'):'')+
       (w.uncertain?' <span class="uncertain-flag" title="'+esc(w.uncertain_note||'照片辨識不完全確定')+'">？</span>':'')+'</div>';
  h += '</div>';
  return h;
}
function clsMark(kind){
  clsChoice = kind; clsRevealed = true;
  S.marks[clsCurrent.num] = kind; save();
  renderClassifyRevealed();
}
function clsSwitch(){
  clsChoice='unfam'; S.marks[clsCurrent.num]='unfam'; save();
  renderClassifyRevealed();
}
function renderClassifyRevealed(){ renderClassify(); }
function clsNext(){
  clsCurrent=null; clsRevealed=false;
  const scope = scopeWords();
  const queue = scope.filter(w=>!S.marks[w.num]);
  if(queue.length===0){ S.plan=null; save(); go('plan'); return; }   // 全部分完 → 直接進 1.5
  renderClassify();
}

/* ---------- ②(1.5) plan ---------- */
let planPreviewDays = null;
function renderPlan(){
  setProgress('',0,0);
  const scope = scopeWords();
  const fams = scope.filter(w=>S.marks[w.num]==='fam').sort(sortLearn);
  const unfams = scope.filter(w=>S.marks[w.num]==='unfam').sort(sortLearn);
  if(fams.length+unfams.length===0){
    $screen.innerHTML='<div class="card center">先完成 ① 分類測驗，才能安排計畫喔。<button class="big btn-main" onclick="go(\'classify\')">去分類 →</button></div>';
    return;
  }
  let html = '<div class="card center">';
  html += '<div>分類結果：<b class="stat-fam">熟悉 '+fams.length+' 字</b>、<b class="stat-unfam">不熟悉 '+unfams.length+' 字</b></div>';
  html += '<div class="small-note" style="margin-top:6px">不熟悉的字比較費力，配量時 1 個不熟悉字＝2 份、熟悉字＝1 份</div>';
  html += '<div style="margin:14px 0">要分幾天學完？　<input type="number" id="days-in" class="day-input" min="1" max="14" value="'+
          (planPreviewDays || (S.plan&&S.plan.days) || 3)+'"> 天</div>';
  html += '<div class="chips" style="justify-content:center">'+[2,3,4,5,6,7].map(d=>'<button class="chip" onclick="setDays('+d+')">'+d+' 天</button>').join('')+'</div>';
  html += '<button class="big btn-ghost" onclick="previewPlan()">產生計畫表預覽</button>';
  html += '</div>';

  const days = planPreviewDays || (S.plan && S.plan.days);
  if(days){
    const batches = buildBatches(fams.map(w=>w.num), unfams.map(w=>w.num), days);
    const curK = S.plan ? planDayIndex() : -1;
    html += '<div class="card"><b>'+days+' 天學習計畫表</b>';
    html += '<table class="plan-table"><tr><th>天</th><th>熟悉</th><th>不熟悉</th><th>合計</th></tr>';
    batches.forEach((b,i)=>{
      html += '<tr'+(S.plan&&i+1===curK?' class="today-row"':'')+'><td>Day '+(i+1)+(S.plan&&i+1===curK?'（今天）':'')+'</td><td>'+
        b.fam.length+' 字</td><td>'+b.unfam.length+' 字</td><td>'+(b.fam.length+b.unfam.length)+' 字</td></tr>';
    });
    html += '</table>';
    html += '<div class="small-note" style="margin-top:8px">點開看每天的字：</div>';
    batches.forEach((b,i)=>{
      html += '<details style="margin-top:6px"><summary>Day '+(i+1)+'（'+(b.fam.length+b.unfam.length)+' 字）</summary><div style="margin-top:6px">';
      b.unfam.forEach(n=>{ html += planWordLine(byNum[n],'unfam'); });
      b.fam.forEach(n=>{ html += planWordLine(byNum[n],'fam'); });
      html += '</div></details>';
    });
    if(!S.plan || S.plan.days!==days){
      html += '<button class="big btn-main" onclick="adoptPlan('+days+')">✅ 就用這個計畫（從今天開始）</button>';
      if(S.plan) html += '<div class="small-note center">（採用新計畫會從第 1 天重新開始）</div>';
    } else {
      html += '<button class="big btn-main" onclick="go(\'today\')">前往今日練習 →</button>';
    }
    html += '</div>';
  }
  $screen.innerHTML = html;
  const inp = document.getElementById('days-in');
  if(inp) inp.onchange = ()=>{ planPreviewDays = Math.max(1,Math.min(14,parseInt(inp.value)||3)); renderPlan(); };
}
function planWordLine(w,kind){
  return '<div class="list-item"><span class="pill '+kind+'">'+(kind==='fam'?'熟':'不熟')+'</span>'+
    '<span class="w">'+w.word+'</span><span class="stars" style="font-size:.85rem">'+starStr(w.stars)+'</span>'+
    '<span class="zh">'+w.senses.map(s=>s.zh).join('；')+'</span></div>';
}
function setDays(d){ planPreviewDays=d; renderPlan(); }
function previewPlan(){
  const inp=document.getElementById('days-in');
  planPreviewDays = Math.max(1,Math.min(14,parseInt(inp.value)||3));
  renderPlan();
}
function buildBatches(famNums, unfamNums, days){
  const batches = Array.from({length:days},()=>({fam:[],unfam:[]}));
  // 不熟悉平均鋪（每字算 2 份）
  const baseU = Math.floor(unfamNums.length/days), extraU = unfamNums.length%days;
  let ui=0;
  for(let d=0; d<days; d++){
    const take = baseU + (d<extraU?1:0);
    batches[d].unfam = unfamNums.slice(ui, ui+take); ui+=take;
  }
  // 熟悉字補到每天加權份量接近平均
  const weights = batches.map(b=>b.unfam.length*2);
  famNums.forEach(n=>{
    let best=0;
    for(let d=1; d<days; d++){ if(weights[d]<weights[best]) best=d; }
    batches[best].fam.push(n); weights[best]+=1;
  });
  return batches;
}
function adoptPlan(days){
  const scope = scopeWords();
  const fams = scope.filter(w=>S.marks[w.num]==='fam').sort(sortLearn).map(w=>w.num);
  const unfams = scope.filter(w=>S.marks[w.num]==='unfam').sort(sortLearn).map(w=>w.num);
  S.plan = {days, start: todayStr(), batches: buildBatches(fams, unfams, days), doneDays:{}};
  planPreviewDays = null;
  save(); go('today');
}

/* ---------- ③ today (step 2 選堆) ---------- */
let viewDay = null;
function renderToday(){
  setProgress('',0,0);
  if(!S.plan){
    $screen.innerHTML='<div class="card center">還沒有學習計畫。<button class="big btn-main" onclick="go(\'plan\')">先去安排 →</button></div>';
    return;
  }
  const k = viewDay || planDayIndex();
  const b = S.plan.batches[k-1] || {fam:[],unfam:[]};
  let html = '<div class="card center">';
  html += '<div class="small-note">今天是第 '+planDayIndex()+' 天（共 '+S.plan.days+' 天）'+
          (S.plan.doneDays[k]?'　✅ 這天已完成':'')+'</div>';
  html += '<div class="chips" style="justify-content:center">'+
    S.plan.batches.map((_,i)=>'<button class="chip'+((i+1)===k?' on':'')+'" onclick="viewDay='+(i+1)+';renderToday()">D'+(i+1)+(S.plan.doneDays[i+1]?'✓':'')+'</button>').join('')+'</div>';
  html += '<div style="margin:10px 0 4px"><b>第 '+k+' 天要練這些字：</b></div>';
  b.unfam.forEach(n=>{ html += planWordLine(byNum[n],'unfam'); });
  b.fam.forEach(n=>{ html += planWordLine(byNum[n],'fam'); });
  html += '<div class="small-note" style="margin:12px 0 4px">先練哪一堆？（流程：聽發音輪 → 聽力測驗）</div>';
  if(b.unfam.length) html += '<button class="big btn-unfam" onclick="startPile('+k+',\'unfam\')">先練不熟悉（'+b.unfam.length+' 字）</button>';
  if(b.fam.length) html += '<button class="big btn-fam" onclick="startPile('+k+',\'fam\')">先練熟悉（'+b.fam.length+' 字）</button>';
  if(!S.plan.doneDays[k]) html += '<button class="big btn-plain" onclick="markDayDone('+k+')">把這天標為完成</button>';
  html += '</div>';
  $screen.innerHTML = html;
}
function markDayDone(k){ S.plan.doneDays[k]=true; save(); renderToday(); }

/* ---------- session（step 3 聽發音輪 + step 4 測驗 + step 5 複習）---------- */
let sess = null;   // {nums, idx, kind:'fam'|'unfam'|'review', dayK, phase:'listen'|'quiz', quiz:{...}}
function startPile(dayK, kind){
  const b = S.plan.batches[dayK-1];
  sess = {nums: b[kind].slice(), idx:0, kind, dayK, otherKind: kind==='fam'?'unfam':'fam'};
  if(sess.nums.length===0){ alert('這一堆沒有字'); return; }
  S.screen='listen'; save(); render();
}
function startReview(){
  if(S.review.length===0) return;
  sess = {nums: S.review.slice(), idx:0, kind:'review', dayK:null, otherKind:null};
  S.screen='listen'; save(); render();
}

/* step 3 聽發音輪 */
function renderListen(){
  if(!sess){ go('today'); return; }
  const total = sess.nums.length;
  setProgress((sess.kind==='review'?'複習・':'')+'聽發音輪', sess.idx+1, total);
  const w = byNum[sess.nums[sess.idx]];
  let html = '<div class="card center">';
  html += '<div class="stars">'+starStr(w.stars)+'</div>';
  html += '<div class="word-big">'+w.word+'</div>';
  html += '<div class="kk">KK '+(w.kk_us?('['+w.kk_us+']'):'')+(w.kk_uk?('　英 ['+w.kk_uk+']'):'')+'</div>';
  w.senses.forEach(s=>{ html += '<div class="pos-zh"><span class="pos">'+s.pos+'</span>'+s.zh+
    '<span class="badge-part">Part '+w.part+' 常見</span></div>'; });
  html += '<div style="margin:10px 0" class="row">'+
    '<button class="speak-btn" onclick="speak(\''+esc(w.word)+'\')">🔊 單字</button>'+
    (w.example_en?'<button class="speak-btn" onclick="speak(\''+esc(w.example_en)+'\')">🔊 例句</button>':'')+
    '<span class="speed-toggle"><button id="sp-n" class="'+(slowMode?'':'on')+'" onclick="setSpeed(false)">正常</button><button id="sp-s" class="'+(slowMode?'on':'')+'" onclick="setSpeed(true)">慢速</button></span>'+
    '</div>';
  if(w.example_en){
    html += '<div class="example"><div class="en">'+clickableWords(w.example_en)+'</div>'+
            '<div class="zh">'+w.example_zh+(w.example_src==='原創'?'<span class="tag" style="font-size:.75rem;color:#999">（自製例句）</span>':'')+'</div></div>';
  }
  if(w.exam_point){
    html += '<div class="tipbox"><b class="lbl">出題重點</b>　'+w.exam_point+'</div>';
  }
  if(w.related && w.related.length){
    html += '<div class="relbox">'+w.related.map(r=>'<div><span class="tag">'+r.rel+'</span>'+r.text+'</div>').join('')+'</div>';
  }
  html += '</div>';
  html += '<div class="row">'+
    '<button class="big btn-plain" '+(sess.idx===0?'disabled':'')+' onclick="listenNav(-1)">← 上一個</button>'+
    '<button class="big btn-ghost" onclick="replayCard()">🔁 重播</button>'+
    '<button class="big btn-main" onclick="listenNav(1)">'+(sess.idx===total-1?'進入聽力測驗 →':'下一個 →')+'</button></div>';
  $screen.innerHTML = html;
  bindWordClicks();
  speakWordThenExample(w);
}
function setSpeed(s){ slowMode=s; document.getElementById('sp-n').classList.toggle('on',!s); document.getElementById('sp-s').classList.toggle('on',s); }
function replayCard(){ speakWordThenExample(byNum[sess.nums[sess.idx]]); }
function listenNav(d){
  if(sess.idx+d >= sess.nums.length){ startQuiz(); return; }
  sess.idx = Math.max(0, sess.idx+d);
  renderListen();
}
function clickableWords(sentence){
  return sentence.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok) || tok==='') return tok;
    const clean = tok.replace(/[^A-Za-z''-]/g,'');
    if(!clean) return tok;
    return '<span class="w" data-w="'+esc(clean)+'">'+tok+'</span>';
  }).join('');
}
function bindWordClicks(){
  $screen.querySelectorAll('.example .en span.w').forEach(sp=>{
    sp.onclick = ()=>{
      $screen.querySelectorAll('.example .en span.w.hl').forEach(x=>x.classList.remove('hl'));
      sp.classList.add('hl');
      speak(sp.dataset.w);
    };
  });
}

/* step 4 聽力測驗 */
function startQuiz(){
  const qs = sess.nums.map(n=>{
    const w = byNum[n];
    const useSentence = w.example_en && Math.random()<0.3;
    const pool = WORDS.filter(x=>x.num!==n);
    shuffle(pool);
    const opts = [w].concat(pool.slice(0,3));
    shuffle(opts);
    return {num:n, useSentence, options:opts.map(o=>({num:o.num, word:o.word}))};
  });
  shuffle(qs);
  sess.phase='quiz';
  sess.quiz = {qs, i:0, score:0, answered:false, wrongSet:[]};
  S.screen='quiz'; save(); render();
}
function renderQuiz(){
  if(!sess || !sess.quiz){ go('today'); return; }
  const Q = sess.quiz, q = Q.qs[Q.i], w = byNum[q.num];
  setProgress((sess.kind==='review'?'複習・':'')+'聽力測驗', Q.i+(Q.answered?1:0), Q.qs.length);
  let html = '<div class="card center">';
  html += '<div class="small-note">第 '+(Q.i+1)+' 題／共 '+Q.qs.length+' 題　　得分 '+Q.score+'</div>';
  html += '<div style="margin:12px 0"><button class="speak-btn" onclick="playQ()">🔊 再聽一次</button>　'+
    '<span class="speed-toggle"><button id="sp-n" class="'+(slowMode?'':'on')+'" onclick="setSpeed(false)">正常</button><button id="sp-s" class="'+(slowMode?'on':'')+'" onclick="setSpeed(true)">慢速</button></span></div>';
  html += '<div class="small-note">'+(q.useSentence?'他唸的是一整句例句，句子裡的主角是哪個字？':'他唸的是哪個字？')+'</div>';
  q.options.forEach((o,oi)=>{
    let cls='opt', extra='';
    if(Q.answered){
      if(o.num===q.num) cls+=' correct';
      else if(Q.pickedIdx===oi) cls+=' wrong';
      extra='disabled';
    }
    html += '<button class="'+cls+'" '+extra+' onclick="answer('+oi+')">'+String.fromCharCode(65+oi)+'.　'+o.word+'</button>';
  });
  if(Q.answered){
    const right = q.options[Q.pickedIdx] && q.options[Q.pickedIdx].num===q.num;
    html += '<div class="feedback '+(right?'good':'bad')+'">'+Q.fbMsg+'</div>';
    html += senseBlock(w);
    if(right && !Q.selfMarked){
      html += '<div class="small-note">這個字你覺得？</div><div class="row">'+
        '<button class="big btn-fam" onclick="selfMark(true)">✅ 已掌握</button>'+
        '<button class="big btn-warn" onclick="selfMark(false)">📌 還要複習</button></div>';
    } else {
      html += '<button class="big btn-main" onclick="nextQ()">'+(Q.i===Q.qs.length-1?'看成績 →':'下一題 →')+'</button>';
    }
  }
  html += '</div>';
  $screen.innerHTML = html;
  if(!Q.answered) playQ();
}
function playQ(){
  const Q=sess.quiz, q=Q.qs[Q.i], w=byNum[q.num];
  speak(q.useSentence ? w.example_en : w.word);
}
function answer(oi){
  const Q=sess.quiz, q=Q.qs[Q.i];
  if(Q.answered) return;
  Q.answered=true; Q.pickedIdx=oi; Q.selfMarked=false;
  const right = q.options[oi].num===q.num;
  if(right){ Q.score++; Q.fbMsg=pick(PRAISE); }
  else{
    Q.fbMsg=pick(COMFORT);
    addReview(q.num); Q.wrongSet.push(q.num);
  }
  save(); renderQuiz();
}
function selfMark(mastered){
  const Q=sess.quiz, q=Q.qs[Q.i];
  Q.selfMarked=true;
  if(mastered){
    removeReview(q.num);
    if(!S.mastered.includes(q.num)) S.mastered.push(q.num);
  } else {
    addReview(q.num);
  }
  save();
  nextQ(true);
}
function nextQ(fromMark){
  const Q=sess.quiz;
  if(Q.i===Q.qs.length-1){ showQuizResult(); return; }
  Q.i++; Q.answered=false; Q.pickedIdx=null; Q.selfMarked=false;
  renderQuiz();
}
function addReview(num){ if(!S.review.includes(num)) S.review.push(num); const mi=S.mastered.indexOf(num); if(mi>=0) S.mastered.splice(mi,1); }
function removeReview(num){ const i=S.review.indexOf(num); if(i>=0) S.review.splice(i,1); }
function showQuizResult(){
  const Q=sess.quiz;
  setProgress('聽力測驗', Q.qs.length, Q.qs.length);
  const pct = Math.round(Q.score/Q.qs.length*100);
  let html = '<div class="card center">';
  html += '<div class="feedback good" style="font-size:1.3rem">測驗結束！</div>';
  html += '<div class="stat-num">'+Q.score+' / '+Q.qs.length+'</div>';
  html += '<div class="small-note" style="margin:6px 0">'+(pct>=80?'表現很棒，繼續前進！🌟':pct>=50?'不錯的開始，複習一輪會更穩 😊':'第一次聽本來就不容易，複習幾輪就會進步 🌱')+'</div>';
  if(S.review.length>0){
    html += '<button class="big btn-warn" onclick="startReview()">🔁 複習這些字（'+S.review.length+' 個）</button>';
  }
  if(sess.kind!=='review' && sess.dayK){
    const other = S.plan.batches[sess.dayK-1][sess.otherKind];
    if(other && other.length){
      html += '<button class="big btn-ghost" onclick="startPile('+sess.dayK+',\''+sess.otherKind+'\')">練另一堆：'+
        (sess.otherKind==='fam'?'熟悉':'不熟悉')+'（'+other.length+' 字）→</button>';
    }
    html += '<button class="big btn-main" onclick="finishDay()">今天到這裡，標記完成 ✅</button>';
  }
  html += '<button class="big btn-plain" onclick="go(\'home\')">回首頁</button>';
  html += '</div>';
  $screen.innerHTML = html;
}
function finishDay(){
  if(sess && sess.dayK){ S.plan.doneDays[sess.dayK]=true; save(); }
  go('today');
}

/* ---------- browse 總覽 ---------- */
function renderBrowse(){
  const scope = scopeWords().slice().sort(sortLearn);
  setProgress('',0,0);
  let html = '<div class="card">';
  html += '<div class="small-note">點 🔊 聽發音；點字展開細節。共 '+scope.length+' 字</div>';
  scope.forEach(w=>{
    const mk = S.marks[w.num];
    html += '<details style="border-bottom:1px solid var(--line); padding:6px 0"><summary style="cursor:pointer">'+
      '<span class="stars" style="font-size:.85rem">'+starStr(w.stars)+'</span> <b style="color:var(--brand-dark)">'+w.word+'</b>'+
      (mk?' <span class="pill '+mk+'">'+(mk==='fam'?'熟':'不熟')+'</span>':'')+
      (S.review.includes(w.num)?' <span class="pill unfam">複習中</span>':'')+
      '　<button class="speak-btn mini" onclick="event.preventDefault();speak(\''+esc(w.word)+'\')">🔊</button></summary>'+
      '<div style="padding:6px 2px">'+senseBlock(w)+
      (w.example_en?'<div class="example"><div class="en">'+clickableWords(w.example_en)+'</div><div class="zh">'+w.example_zh+'</div></div>':'')+
      (w.exam_point?'<div class="tipbox"><b class="lbl">出題重點</b>　'+w.exam_point+'</div>':'')+
      (w.related&&w.related.length?'<div class="relbox">'+w.related.map(r=>'<div><span class="tag">'+r.rel+'</span>'+r.text+'</div>').join('')+'</div>':'')+
      '</div></details>';
  });
  html += '</div>';
  $screen.innerHTML = html;
  $screen.querySelectorAll('.example .en span.w').forEach(sp=>{
    sp.onclick=()=>{ sp.classList.toggle('hl'); speak(sp.dataset.w); };
  });
}

/* ---------- utils ---------- */
function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- boot ---------- */
if(!('speechSynthesis' in window)){
  alert('這個瀏覽器不支援語音合成（TTS），聽發音與聽力測驗將無法出聲。建議用 Chrome / Edge / Safari 開啟。');
}
if(['listen','quiz'].includes(S.screen) ) S.screen = 'home';   // session 不跨次保存
render();
</script>
