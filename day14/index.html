<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 14｜旅遊、機場｜TOEIC 單字</title>
<style>
:root{
  --green:#0e7c66; --green-dark:#0a5c4c; --green-light:#e6f4f0;
  --amber:#b45309; --amber-bg:#fef3c7;
  --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --bg:#f6f8f7; --card:#ffffff; --red:#dc2626; --blue:#2563eb;
  --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
header{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;padding:16px 20px 12px}
.hwrap{max-width:1080px;margin:0 auto}
h1{font-size:1.35rem;font-weight:700;letter-spacing:.5px}
h1 small{font-weight:400;opacity:.85;font-size:.85rem;margin-left:8px}
.audiobar{max-width:1080px;margin:10px auto 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px}
.audiobar label{font-size:.85rem;white-space:nowrap}
.audiobar audio{flex:1;min-width:220px;height:36px}
.audiobar select{border:none;border-radius:6px;padding:4px 6px;font-size:.85rem}
nav{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.tabs{max-width:1080px;margin:0 auto;display:flex;overflow-x:auto}
.tabs button{flex:1;min-width:110px;background:none;border:none;padding:12px 8px;font-size:.95rem;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit}
.tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}
main{max-width:1080px;margin:0 auto;padding:16px}
.panel{display:none}
.panel.active{display:block}
/* toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar input[type=search]{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:.95rem;font-family:inherit}
.toolbar select{padding:9px 8px;border:1px solid var(--line);border-radius:10px;font-size:.9rem;background:#fff;font-family:inherit}
.stat{font-size:.85rem;color:var(--muted);margin-left:auto;white-space:nowrap}
/* cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.fcard{perspective:1200px;min-height:230px;position:relative}
.inner{position:relative;width:100%;min-height:230px;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.fcard.flip .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;overflow:auto}
.face.back{transform:rotateY(180deg)}
.frow{display:flex;align-items:flex-start;gap:6px}
.wnum{font-size:.7rem;color:#fff;background:var(--green);border-radius:6px;padding:1px 7px;margin-top:6px}
.word{font-size:1.5rem;font-weight:700;color:var(--green-dark);word-break:break-word}
.starz{color:var(--amber);font-size:.9rem;letter-spacing:1px}
.kk{color:var(--muted);font-size:.92rem;margin-top:4px;font-family:"Segoe UI",Arial,sans-serif}
.kk span{margin-right:10px}
.partchip{font-size:.7rem;border:1px solid var(--green);color:var(--green);border-radius:20px;padding:0 8px;margin-top:8px;align-self:flex-start}
.hintc{margin-top:auto;color:#c3cbc8;font-size:.78rem;text-align:center;padding-top:10px}
.senses{margin:2px 0 6px}
.senses .pos{color:var(--blue);font-weight:700;font-size:.85rem;margin-right:5px}
.senses div{font-size:1.02rem}
.ex{background:var(--green-light);border-radius:10px;padding:9px 11px;margin:6px 0;font-size:.92rem}
.ex .en{cursor:pointer}
.ex .en:hover{background:#c9e8df;border-radius:4px}
.ex .en b{color:var(--green-dark)}
.ex .zh{color:var(--muted);font-size:.87rem;margin-top:3px}
.rel{font-size:.83rem;color:var(--muted);margin-top:4px}
.rel b{color:var(--ink);font-weight:600}
.reltag{display:inline-block;font-size:.7rem;border-radius:4px;padding:0 5px;margin-right:4px;color:#fff}
.reltag.r派{background:#7c3aed}.reltag.r同{background:#0891b2}.reltag.r反{background:#dc2626}
.expoint{background:var(--amber-bg);border-left:4px solid var(--amber);border-radius:6px;padding:8px 10px;font-size:.85rem;margin-top:6px;white-space:pre-wrap}
.expoint::before{content:"📌 用法提醒";display:block;font-weight:700;color:var(--amber);font-size:.8rem;margin-bottom:2px}
.spk{background:none;border:none;font-size:1.05rem;cursor:pointer;padding:2px 4px;vertical-align:middle}
.spk:active{transform:scale(1.2)}
.cardops{display:flex;gap:8px;margin-top:8px}
.mark{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:6px;font-size:.85rem;cursor:pointer;font-family:inherit}
.mark.known{background:var(--green);border-color:var(--green);color:#fff}
.mark.review{background:#fff7ed;border-color:var(--amber);color:var(--amber)}
.uncertain-badge{font-size:.68rem;color:#fff;background:var(--red);border-radius:4px;padding:0 5px;margin-left:4px;vertical-align:middle}
/* simple word tables */
.wgroup{margin-bottom:22px}
.wgroup h3{font-size:1.02rem;color:var(--green-dark);border-left:4px solid var(--green);padding-left:9px;margin-bottom:10px}
.wtable{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.wtable td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:.93rem;vertical-align:top}
.wtable tr:last-child td{border-bottom:none}
.wtable .w{font-weight:700;color:var(--green-dark);white-space:nowrap}
.wtable .p{color:var(--blue);font-size:.83rem;white-space:nowrap}
/* quiz */
.qzsec{margin-bottom:26px}
.qzsec h3{font-size:1.05rem;color:var(--green-dark);margin-bottom:4px}
.qzsec .desc{font-size:.85rem;color:var(--muted);margin-bottom:12px}
.qcard{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.qtext{font-weight:600;margin-bottom:10px}
.qtext .qno{color:var(--green);margin-right:6px}
.opts{display:grid;gap:8px}
.opts button{text-align:left;padding:10px 12px;border:1.5px solid var(--line);background:#fafafa;border-radius:10px;cursor:pointer;font-size:.93rem;font-family:inherit;transition:all .15s}
.opts button:hover:not(:disabled){border-color:var(--green);background:var(--green-light)}
.opts button.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:700}
.opts button.wrong{background:#fee2e2;border-color:var(--red);color:var(--red)}
.opts button:disabled{cursor:default;opacity:.85}
.qfeed{margin-top:8px;font-size:.88rem;display:none}
.qfeed.show{display:block}
.qz-score{background:var(--green-light);border-radius:10px;padding:10px 14px;font-size:.95rem;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.qz-score button{border:1px solid var(--green);color:var(--green);background:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:.88rem}
.bigspk{border:1.5px solid var(--green);background:var(--green-light);color:var(--green-dark);border-radius:10px;padding:8px 16px;font-size:1rem;cursor:pointer;font-family:inherit;margin-bottom:10px}
footer{text-align:center;color:var(--muted);font-size:.78rem;padding:20px}
@media(max-width:640px){
  .grid{grid-template-columns:1fr}
  h1{font-size:1.15rem}
  .stat{margin-left:0;width:100%}
}
</style>
</head>

  <div class="hwrap">

rd": "scenic", "pos": "adj.", "zh": "風景優美的"}, {"word": "breathtaking", "pos": "adj.", "zh": "令人屏息的"}]}], "adv_groups": [{"title": "900分挑戰字 — 旅遊主題", "list": [{"word": "embark", "pos": "v.", "zh": "登上（船、機）；著手"}, {"word": "disembark", "pos": "v.", "zh": "下（船、機）"}, {"word": "expedite", "pos": "v.", "zh": "加速辦理"}, {"word": "stopover", "pos": "n.", "zh": "中途停留站"}, {"word": "quarantine", "pos": "n.", "zh": "檢疫"}, {"word": "transit", "pos": "n.", "zh": "過境；運輸"}, {"word": "courteous", "pos": "adj.", "zh": "有禮貌的"}, {"word": "punctual", "pos": "adj.", "zh": "準時的"}, {"word": "exquisite", "pos": "adj.", "zh": "精緻的"}, {"word": "secluded", "pos": "adj.", "zh": "僻靜的"}, {"word": "bustling", "pos": "adj.", "zh": "熙來攘往的"}, {"word": "unwind", "pos": "v.", "zh": "放鬆"}]}], "checkup": [{"type": "match", "q": "「itinerary」的中文字義是？", "options": ["行程表", "行李轉盤", "緊急狀況", "入場費"], "answer": 0, "explain": "itinerary n. 行程表，旅程路線"}, {"type": "match", "q": "「declare」的中文字義是？", "options": ["延誤", "（海關）申報；宣布", "使混淆", "盡情享受"], "answer": 1, "explain": "declare v. （海關）申報；宣布"}, {"type": "match", "q": "「proximity」的中文字義是？", "options": ["款待", "多樣性", "鄰近，接近", "目的地"], "answer": 2, "explain": "proximity n. 鄰近；片語 in close proximity to"}, {"type": "match", "q": "「hospitality」的中文字義是？", "options": ["醫院", "款待，好客", "住宿", "檢疫"], "answer": 1, "explain": "hospitality n. 款待（勿與 hospital 醫院混淆）"}, {"type": "match", "q": "「brochure」的中文字義是？", "options": ["（宣傳）小冊子", "登機證", "行李箱", "紀念品"], "answer": 0, "explain": "brochure n. 小冊子，同 pamphlet"}, {"type": "fill", "q": "Please ______ your meal preference when you book the flight.（選出符合文意的單字）", "options": ["specify", "declare", "indulge", "confuse"], "answer": 0, "explain": "specify 具體說明：訂位時具體說明餐點偏好。"}, {"type": "fill", "q": "All ______ flights are listed on the departure board.", "options": ["missing", "comfortable", "outgoing", "exotic"], "answer": 2, "explain": "outgoing flights 離境班機。"}, {"type": "fill", "q": "The hotel is in close ______ to the convention center.", "options": ["hospitality", "proximity", "seating", "duty"], "answer": 1, "explain": "in close proximity to 緊鄰～，固定片語。"}, {"type": "fill", "q": "Travelers must go through ______ before leaving the airport.", "options": ["customs", "carrier", "baggage", "attraction"], "answer": 0, "explain": "go through customs 通過海關。"}, {"type": "fill", "q": "The package includes ______ mileage for the rental car.", "options": ["unavailable", "diverse", "unlimited", "superb"], "answer": 2, "explain": "unlimited mileage 不限里程，租車廣告常見。"}]};
const DAY = DATA.day;
const LS_KEY = 'toeic_day' + DAY + '_marks';

/* ---------- TTS ---------- */
let voices = [];
function loadVoices(){ voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en')); }
loadVoices();
if (typeof speechSynthesis!=='undefined') speechSynthesis.onvoiceschanged = loadVoices;
function speak(text){
  if(!('speechSynthesis' in window)){ alert('此瀏覽器不支援語音合成'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = parseFloat(document.getElementById('ttsRate').value);
  const v = voices.find(v=>v.lang==='en-US') || voices[0];
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
function spkBtn(text, big){
  return '<button class="spk" title="發音" onclick="event.stopPropagation();speak(' + JSON.stringify(text).replace(/"/g,'&quot;') + ')">🔊</button>';
}

/* ---------- audio rate ---------- */
document.getElementById('audioRate').addEventListener('change', e=>{
  document.getElementById('fullAudio').playbackRate = parseFloat(e.target.value);
});
document.getElementById('fullAudio').addEventListener('play', e=>{
  e.target.playbackRate = parseFloat(document.getElementById('audioRate').value);
});

/* ---------- tabs ---------- */
document.querySelectorAll('.tabs button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.tab).classList.add('active');
  });
});

/* ---------- marks ---------- */
let marks = {};
try{ marks = JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){ marks={}; }
function saveMarks(){ localStorage.setItem(LS_KEY, JSON.stringify(marks)); }
function setMark(num, val){
  if(marks[num]===val) delete marks[num]; else marks[num]=val;
  saveMarks(); renderCards();
}

/* ---------- helpers ---------- */
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function stars(n){ return '★'.repeat(n||0); }
function hiWord(sentence, word){
  if(!sentence) return '';
  const base = word.replace(/[^A-Za-z\- ]/g,'').split(/[ /]/)[0];
  const re = new RegExp('\\b(' + base.slice(0, Math.max(3, base.length-2)) + '[A-Za-z]*)', 'gi');
  return esc(sentence).replace(re, '<b>$1</b>');
}

/* ---------- core cards ---------- */
const posSet = new Set();
DATA.main.forEach(w=>w.senses.forEach(s=>posSet.add(s.pos)));
const fPos = document.getElementById('fPos');
[...posSet].sort().forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p; fPos.appendChild(o); });

function cardHTML(w){
  const mk = marks[w.num]||'none';
  const kk = [w.kk_us?('<span>美 ['+esc(w.kk_us)+']</span>'):'', w.kk_uk?('<span>英 ['+esc(w.kk_uk)+']</span>'):''].join('');
  const sensesF = w.senses.map(s=>'<div><span class="pos">'+esc(s.pos)+'</span>'+esc(s.zh)+'</div>').join('');
  const rel = (w.related&&w.related.length)? '<div class="rel">'+w.related.map(r=>'<span class="reltag r'+esc(r.rel)+'">'+esc(r.rel)+'</span><b>'+esc(r.text)+'</b>').join('<br>')+'</div>':'';
  const exp = w.exam_point? '<div class="expoint">'+esc(w.exam_point)+'</div>':'';
  const unc = w.uncertain? '<span class="uncertain-badge" title="'+esc(w.uncertain_note||'辨識不確定')+'">?</span>':'';
  return '<div class="fcard" data-num="'+w.num+'"><div class="inner" onclick="this.parentNode.classList.toggle(\'flip\')">' +
    '<div class="face front">' +
      '<div class="frow"><span class="wnum">'+w.num+'</span><span class="word">'+esc(w.word)+'</span>'+spkBtn(w.word)+'<span class="starz">'+stars(w.stars)+'</span>'+unc+'</div>' +
      '<div class="kk">'+kk+'</div>' +
      '<span class="partchip">Part '+esc(w.part)+' 常見</span>' +
      '<div class="hintc">點卡片翻面看字義與例句</div>' +
    '</div>' +
    '<div class="face back">' +
      '<div class="frow" style="align-items:center"><span class="word" style="font-size:1.1rem">'+esc(w.word)+'</span>'+spkBtn(w.word)+'</div>' +
      '<div class="senses">'+sensesF+'</div>' +
      (w.example_en? '<div class="ex"><div class="en" title="點句子高亮/再點🔊發音">'+hiWord(w.example_en, w.word)+' '+spkBtn(w.example_en)+'</div><div class="zh">'+esc(w.example_zh)+'</div></div>':'') +
      rel + exp +
      '<div class="cardops">' +
        '<button class="mark '+(mk==='known'?'known':'')+'" onclick="event.stopPropagation();setMark('+w.num+',\'known\')">✓ 已熟記</button>' +
        '<button class="mark '+(mk==='review'?'review':'')+'" onclick="event.stopPropagation();setMark('+w.num+',\'review\')">↻ 待複習</button>' +
      '</div>' +
    '</div>' +
  '</div></div>';
}

function renderCards(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const fs = document.getElementById('fStar').value;
  const fp = document.getElementById('fPos').value;
  const fk = document.getElementById('fKnown').value;
  const flipped = new Set([...document.querySelectorAll('.fcard.flip')].map(c=>c.dataset.num));
  const list = DATA.main.filter(w=>{
    if(fs && String(w.stars)!==fs) return false;
    if(fp && !w.senses.some(s=>s.pos===fp)) return false;
    const mk = marks[w.num]||'none';
    if(fk && mk!==fk) return false;
    if(q){
      const hay = (w.word+' '+w.senses.map(s=>s.zh).join(' ')+' '+(w.related||[]).map(r=>r.text).join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('cardGrid').innerHTML = list.map(cardHTML).join('');
  flipped.forEach(n=>{ const c=document.querySelector('.fcard[data-num="'+n+'"]'); if(c) c.classList.add('flip'); });
  const known = DATA.main.filter(w=>marks[w.num]==='known').length;
  document.getElementById('coreStat').textContent = '顯示 '+list.length+' / '+DATA.main.length+' 字・已熟記 '+known;
}
['q','fStar','fPos','fKnown'].forEach(id=>document.getElementById(id).addEventListener('input', renderCards));
renderCards();

/* ---------- simple word lists ---------- */
function wordTable(arr){
  return '<table class="wtable">'+arr.map(w=>'<tr><td class="w">'+esc(w.word)+' '+spkBtn(w.word)+'</td><td class="p">'+esc(w.pos)+'</td><td>'+esc(w.zh)+(w.uncertain?' <span class="uncertain-badge">?</span>':'')+'</td></tr>').join('')+'</table>';
}
function renderGroups(el, groups){
  let html='';
  for(const g of groups){ if(g.list&&g.list.length) html += '<div class="wgroup"><h3>'+g.title+'（'+g.list.length+' 字）</h3>'+wordTable(g.list)+'</div>'; }
  document.getElementById(el).innerHTML = html || '<p style="color:var(--muted)">（本日無此區內容）</p>';
}
renderGroups('extraWrap', DATA.extra_groups||[]);
renderGroups('advWrap', DATA.adv_groups||[]);

/* ---------- quiz engines ---------- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function renderMC(wrapId, scoreId, items, opts){
  const wrap = document.getElementById(wrapId);
  const state = {done:0, right:0, total:items.length};
  function upd(){ document.querySelector('#'+scoreId+' span').textContent = '已答 '+state.done+' / '+state.total+'・答對 '+state.right; }
  wrap.innerHTML='';
  items.forEach((it, qi)=>{
    const div = document.createElement('div'); div.className='qcard';
    let head = '<div class="qtext"><span class="qno">Q'+(qi+1)+'</span>'+ (it.audioWord? '' : esc(it.q)) +'</div>';
    if(it.audioWord) head = '<div class="qtext"><span class="qno">Q'+(qi+1)+'</span>聽發音，選出正確的單字：</div><button class="bigspk" onclick="speak('+JSON.stringify(it.audioWord).replace(/"/g,'&quot;')+')">▶ 播放發音</button>';
    div.innerHTML = head + '<div class="opts"></div><div class="qfeed"></div>';
    const optsEl = div.querySelector('.opts');
    it.options.forEach((op, oi)=>{
      const b = document.createElement('button');
      b.innerHTML = String.fromCharCode(65+oi)+'. '+esc(op);
      b.addEventListener('click', ()=>{
        if(div.dataset.done) return;
        div.dataset.done='1'; state.done++;
        const ok = oi===it.answer;
        if(ok){ state.right++; b.classList.add('correct'); }
        else { b.classList.add('wrong'); optsEl.children[it.answer].classList.add('correct'); }
        [...optsEl.children].forEach(x=>x.disabled=true);
        const f = div.querySelector('.qfeed'); f.classList.add('show');
        f.innerHTML = (ok?'✅ 答對！':'❌ 正確答案：'+String.fromCharCode(65+it.answer)+'. '+esc(it.options[it.answer]))+(it.explain?'<br>'+esc(it.explain):'');
        upd();
      });
      optsEl.appendChild(b);
    });
    wrap.appendChild(div);
  });
  upd();
}

function resetCheckup(){ renderMC('ckWrap','ckScore', DATA.checkup, {}); }
resetCheckup();

function buildListening(){
  const pool = shuffle(DATA.main.filter(w=>/^[A-Za-z\- ]+$/.test(w.word))).slice(0,10);
  const items = pool.map(w=>{
    const wrongs = shuffle(DATA.main.filter(x=>x.num!==w.num)).slice(0,3).map(x=>x.word);
    const options = shuffle([w.word, ...wrongs]);
    return {audioWord:w.word, options, answer:options.indexOf(w.word), explain:w.word+'：'+w.senses.map(s=>s.pos+' '+s.zh).join('；')};
  });
  renderMC('lsWrap','lsScore', items, {});
}
buildListening();
</script>
